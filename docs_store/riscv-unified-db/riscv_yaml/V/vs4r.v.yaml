# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vs4r.v
long_name: "Vector store 4 elements"
description: |
  Stores 4 elements from vector register vs2 to memory starting at address in xs1 register, using vector mask vm. This operation stores elements with register stride.
definedBy:
  extension:
    name: Zvl32b
assembly: vs3, (xs1)
encoding:
  match: 011000101000-----000-----0100111
  variables:
    - name: xs1
      location: 19-15
    - name: vs3
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |
