# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vfmv.v.f
long_name: "Vector floating-point to vector move"
description: |
  Moves floating-point element from scalar register fs1 to vector register vd, using vector mask vm. This operation creates a vector with a single floating-point value.
definedBy:
  extension:
    name: Zvl32b
assembly: vd, fs1
encoding:
  match: 010111100000-----101-----1010111
  variables:
    - name: fs1
      location: 19-15
    - name: vd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |

# SPDX-SnippetBegin
# SPDX-FileCopyrightText: 2017-2025 Contributors to the RISCV Sail Model <https://github.com/riscv/sail-riscv/blob/master/LICENCE>
# SPDX-License-Identifier: BSD-2-Clause
sail(): |
  {
    let rm_3b    = fcsr.FRM();
    let SEW      = get_sew();
    let LMUL_pow = get_lmul_pow();
    let num_elem = get_num_elem(LMUL_pow, SEW);

    if illegal_fp_vd_unmasked(SEW, rm_3b) then { handle_illegal(); return RETIRE_FAIL };
    assert(SEW != 8);

    let 'n = num_elem;
    let 'm = SEW;

    let rs1_val : bits('m)                  = get_scalar_fp(rs1, 'm);
    let vm_val  : vector('n, dec, bool)     = read_vmask(num_elem, 0b1, 0b00000);
    let vd_val  : vector('n, dec, bits('m)) = read_vreg(num_elem, SEW, LMUL_pow, vd);
    result      : vector('n, dec, bits('m)) = undefined;
    mask        : vector('n, dec, bool)     = undefined;

    (result, mask) = init_masked_result(num_elem, SEW, LMUL_pow, vd_val, vm_val);

    foreach (i from 0 to (num_elem - 1)) {
      if mask[i] then result[i] = rs1_val
    };

    write_vreg(num_elem, SEW, LMUL_pow, vd, result);
    vstart = zeros();
    RETIRE_SUCCESS
  }

# SPDX-SnippetEnd
