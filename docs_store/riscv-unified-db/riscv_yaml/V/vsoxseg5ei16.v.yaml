# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: inst_schema.json#
kind: instruction
name: vsoxseg5ei16.v
long_name: Vector ordered store 5 elements of 16 bits with index
description: |
  Stores 5 segments of 16-bit elements from vector register vs2 to memory using ordered access pattern with index register vs1, starting at address in xs1 register, using vector mask vm. The effective element width is 16 bits.
definedBy:
  extension:
    name: Zvl32b
assembly: vs3, (xs1), vs2, vm
encoding:
  match: 100011-----------101-----0100111
  variables:
    - name: vm
      location: 25-25
    - name: vs2
      location: 24-20
    - name: xs1
      location: 19-15
    - name: vs3
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |
